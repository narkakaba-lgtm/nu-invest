{% extends 'platform_invest/base.html' %}

{% block content %}

<div class="container py-5">

    <div class="quiz-card">

        {% if error %}

            <div class="text-center">
                <div class="alert alert-info">{{ error }}</div>
                <a href="{% url 'home' %}" class="btn btn-primary">
                    Retour
                </a>
            </div>

        {% else %}

        <!-- TIMER -->
        <div class="text-center mb-4">

            <div class="timer-circle" id="timer">15</div>

            <div class="mt-2">
                <span class="points-badge">
                    💰 {{ question.points }} Points
                </span>
            </div>

        </div>

        <!-- QUESTION -->
        <h3 class="text-center mb-4 fw-bold">
            {{ question.text }}
        </h3>

        <!-- FORMULAIRE SÉCURISÉ -->
        <form method="POST" id="quizForm">
            {% csrf_token %}

            <input type="hidden" name="answer" id="answerInput">

            <div class="d-grid gap-3">

                <button type="button" class="btn btn-option" onclick="selectAnswer(1)">
                    A. {{ question.choice1 }}
                </button>

                <button type="button" class="btn btn-option" onclick="selectAnswer(2)">
                    B. {{ question.choice2 }}
                </button>

                <button type="button" class="btn btn-option" onclick="selectAnswer(3)">
                    C. {{ question.choice3 }}
                </button>

                <button type="button" class="btn btn-option" onclick="selectAnswer(4)">
                    D. {{ question.choice4 }}
                </button>

            </div>
        </form>

        {% endif %}

    </div>

</div>

<!-- ================= STYLE ================= -->
<style>

body {
    background: #0f172a;
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

.quiz-card {
    max-width: 700px;
    margin: auto;
    background: #1e293b;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.timer-circle {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    border: 4px solid #38bdf8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 1.6rem;
    margin: auto;
    transition: 0.3s;
}

.points-badge {
    background: #fbbf24;
    color: black;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: bold;
    display: inline-block;
}

.btn-option {
    background: #334155;
    color: white;
    padding: 15px;
    border-radius: 12px;
    border: none;
    text-align: left;
    transition: 0.2s ease;
    font-weight: 500;
}

.btn-option:hover {
    background: #475569;
    transform: translateX(5px);
}

</style>

<!-- ================= SCRIPT ================= -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

let timeLeft = 15;
let timer = document.getElementById("timer");
let form = document.getElementById("quizForm");
let answered = false;

// ================= TIMER =================
let interval = setInterval(() => {

    if (!timer) return;

    timeLeft--;
    timer.innerText = timeLeft;

    if (timeLeft <= 5) {
        timer.style.borderColor = "#ef4444";
        timer.style.color = "#ef4444";
    }

    if (timeLeft <= 0) {
        clearInterval(interval);

        Swal.fire({
            title: "⏱ Temps écoulé",
            text: "Réponse non enregistrée",
            icon: "error",
            timer: 1200,
            showConfirmButton: false
        });

        setTimeout(() => {
            form.submit(); // envoie sans réponse
        }, 1200);
    }

}, 1000);

// ================= ANSWER =================
function selectAnswer(value) {

    if (answered) return;
    answered = true;

    document.getElementById("answerInput").value = value;

    clearInterval(interval);

    Swal.fire({
        title: "Réponse envoyée",
        icon: "success",
        timer: 700,
        showConfirmButton: false
    });

    setTimeout(() => {
        form.submit();
    }, 700);
}

</script>

{% endblock %}
